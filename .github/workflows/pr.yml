name: PR Workflow

on:
  pull_request:
    branches: [main]

jobs:
  unit-tests:
    uses: ./.github/workflows/unit-tests.yml
  
  e2e-tests:
    needs: unit-tests
    uses: ./.github/workflows/e2e-tests.yml
    secrets:
      NV_AIR_USER: ${{ secrets.NV_AIR_USER }}
      NV_AIR_TOKEN: ${{ secrets.NV_AIR_TOKEN }}
  
  security:
    uses: ./.github/workflows/security.yml
