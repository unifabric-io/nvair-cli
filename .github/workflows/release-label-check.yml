name: Release Label Check

on:
  pull_request:
    branches: [main]
    types: [opened, reopened, synchronize, labeled]    

jobs:
  check-release-label:
    name: Check Release Label
    runs-on: ubuntu-latest
    
    steps:
      - name: Check for release label
        run: |
          echo "Checking for release/* labels on PR #${{ github.event.pull_request.number }}"
          
          # Check if PR has release/* label
          if echo '${{ toJson(github.event.pull_request.labels) }}' | jq -r '.[].name' | grep -q '^release/'; then
            echo ""
            echo "✓ PR has release/* label"
            echo ""
            echo "Release labels found:"
            echo '${{ toJson(github.event.pull_request.labels) }}' | jq -r '.[].name' | grep '^release/' | sed 's/^/  - /'
            exit 0
          else
            echo ""
            echo "✗ PR does not have release/* label"
            echo ""
            echo "Please add one of the following labels:"
            echo "  - release/feature"
            echo "  - release/bugfix"
            echo "  - release/hotfix"
            echo "  - release/documentation"
            exit 1
          fi
